name: Detect code changes
description: >
  Checks whether a PR or push includes code changes (ignoring docs-only changes).
  Outputs code=true/false for downstream job gating.

outputs:
  code:
    description: "'true' if the changeset includes code files, 'false' if docs-only"
    value: ${{ steps.check.outputs.code }}

runs:
  using: composite
  steps:
    - name: Check for code changes
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        fetch_failed() {
          echo "::warning::Change detection failed (GitHub API error). Running all checks as a precaution."
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" \
              --body "> [!WARNING]
        > **${{ github.workflow }}**: Change detection failed (GitHub API error). Running all checks as a precaution." || true
          fi
          echo "code=true" >> "$GITHUB_OUTPUT"
          exit 0
        }
        if [ "${{ github.event_name }}" = "schedule" ]; then
          echo "code=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename') || fetch_failed
        else
          FILES=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --paginate --jq '.files[].filename') || fetch_failed
        fi
        if [ -z "$FILES" ]; then
          echo "code=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        CODE_FILES=$(echo "$FILES" | grep -vE '\.md$|^LICENSE$' || true)
        if [ -n "$CODE_FILES" ]; then
          echo "code=true" >> "$GITHUB_OUTPUT"
        else
          echo "code=false" >> "$GITHUB_OUTPUT"
        fi
