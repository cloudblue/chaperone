name: CI (Admin Portal)

on:
  push:
    branches:
      - master
      - 'release/**'
    paths:
      - 'admin/**'
      - 'Makefile'
      - '.github/workflows/ci-admin.yml'
  pull_request:
    paths:
      - 'admin/**'
      - 'test/mock-chaperone/**'
      - 'Makefile'
      - '.github/workflows/ci-admin.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: 'v2.8.0'
  PNPM_VERSION: '10.28.2'

jobs:
  lint-go:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run golangci-lint (admin module)
        # The admin module embeds ui/dist in !dev builds; use dev tags for
        # backend lint/test so checks do not depend on prebuilt UI artifacts.
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-mode: goinstall
          working-directory: admin
          args: --build-tags=dev

  lint-ui:
    name: Lint (UI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        working-directory: admin/ui
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        working-directory: admin/ui
        run: pnpm prettier --check "src/**/*.{js,vue,css}"

      - name: Lint
        working-directory: admin/ui
        run: pnpm lint

  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run tests
        # Keep Go test path independent from ui/dist embed requirements.
        run: cd admin && go test -race -tags dev ./...

  test-ui:
    name: Test (UI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        working-directory: admin/ui
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: admin/ui
        run: pnpm test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    # Safety net: a hung step (historically the Playwright browser download)
    # otherwise runs until GitHub's 360-minute default, burning a full
    # runner-day per stuck run. Cap it so failures are fast and actionable.
    timeout-minutes: 25
    needs: [lint-go, lint-ui, test-go, test-ui]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        working-directory: admin/ui
        run: pnpm install --frozen-lockfile

      # Cache the downloaded browser binaries keyed on the lockfile (which
      # pins the Playwright version). On a cache hit the binaries are restored
      # and the install step does not hit cdn.playwright.dev at all, which is
      # the stall-prone path.
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('admin/ui/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        working-directory: admin/ui
        # The browser binaries download from cdn.playwright.dev, which
        # occasionally stalls with no progress. `playwright install` has no
        # stall timeout, so without bounds it hangs until the 6h job ceiling.
        # Bound each attempt and retry: a stalled download is killed at 5min
        # and re-attempted (install is idempotent — already-present browsers
        # are skipped). `--with-deps` re-runs fast on a cache hit (apt only).
        timeout-minutes: 18
        run: |
          for attempt in 1 2 3; do
            timeout 300 pnpm exec playwright install chromium firefox webkit --with-deps && exit 0
            echo "::warning::playwright install attempt ${attempt} stalled or failed; retrying"
          done
          echo "::error::playwright install failed after 3 attempts"
          exit 1

      - name: Run E2E tests
        run: make e2e-admin

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: admin/ui/e2e/playwright-report/
          retention-days: 14

      - name: Post test summary to PR
        # Skipped on forked PRs (read-only token) and on push events.
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: daun/playwright-report-summary@8bb85779022480a59ed8d33d9a4b8bda1c67666b # v4.0.0
        with:
          report-file: admin/ui/e2e/results.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-go, lint-ui, test-go, test-ui]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Build admin portal
        run: make build-admin

      - name: Verify binary exists
        run: |
          test -f bin/chaperone-admin
          ./bin/chaperone-admin --version
