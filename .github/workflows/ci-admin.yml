name: CI (Admin Portal)

on:
  push:
    branches:
      - master
      - 'release/**'
    paths:
      - 'admin/**'
      - 'Makefile'
      - '.github/workflows/ci-admin.yml'
  pull_request:
    paths:
      - 'admin/**'
      - 'test/mock-chaperone/**'
      - 'Makefile'
      - '.github/workflows/ci-admin.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: 'v2.8.0'
  PNPM_VERSION: '10.28.2'

jobs:
  lint-go:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run golangci-lint (admin module)
        # The admin module embeds ui/dist in !dev builds; use dev tags for
        # backend lint/test so checks do not depend on prebuilt UI artifacts.
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-mode: goinstall
          working-directory: admin
          args: --build-tags=dev

  lint-ui:
    name: Lint (UI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        working-directory: admin/ui
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        working-directory: admin/ui
        run: pnpm prettier --check "src/**/*.{js,vue,css}"

      - name: Lint
        working-directory: admin/ui
        run: pnpm lint

  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Run tests
        # Keep Go test path independent from ui/dist embed requirements.
        run: cd admin && go test -race -tags dev ./...

  test-ui:
    name: Test (UI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        working-directory: admin/ui
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: admin/ui
        run: pnpm test

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    # Run inside the official Playwright image: it ships the browser binaries
    # AND their OS dependencies pre-installed, so CI never downloads browsers
    # from cdn.playwright.dev. That download stalled and hung the job to the
    # 6h ceiling (see PR #121). The image tag MUST match the @playwright/test
    # version in admin/ui/pnpm-lock.yaml — bump both together, or Playwright
    # will fall back to downloading the matching browsers at runtime.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    # Safety net: if any step ever hangs again, fail fast instead of running
    # until GitHub's 360-minute default and burning a full runner-day.
    timeout-minutes: 25
    needs: [lint-go, lint-ui, test-go, test-ui]
    permissions:
      contents: read
      pull-requests: write
    env:
      # The job runs as root inside the container while the checked-out
      # workspace is owned by another uid, so `go build`'s default VCS stamping
      # fails with "error obtaining VCS status: exit status 128". These are
      # throwaway test builds, so disable stamping (Go suggests exactly this).
      GOFLAGS: -buildvcs=false
      # Firefox refuses to launch as root when $HOME (/github/home) is owned by
      # another user (the image's pwuser). Point HOME at root's own home — the
      # workaround Playwright prints for running its container on CI as root.
      HOME: /root
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        working-directory: admin/ui
        run: pnpm install --frozen-lockfile

      # The Playwright image is minimal and ships without `make`, which the
      # E2E flow needs: global-setup.js shells out to `make build-admin`.
      # (CGO is disabled in build-admin, so no C toolchain is required.)
      - name: Install make (absent from the Playwright image)
        run: apt-get update && apt-get install -y --no-install-recommends make

      # No browser-install step: the Playwright container image (see the job's
      # `container:` above) already provides chromium, firefox and webkit with
      # their OS deps at the matching version, so nothing is downloaded here.

      - name: Run E2E tests
        run: make e2e-admin

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: admin/ui/e2e/playwright-report/
          retention-days: 14

      - name: Post test summary to PR
        # Skipped on forked PRs (read-only token), on push events, and when the
        # E2E step produced no results.json (e.g. an earlier step failed) — the
        # summary action errors on a missing report file.
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('admin/ui/e2e/results.json') != '' }}
        uses: daun/playwright-report-summary@8bb85779022480a59ed8d33d9a4b8bda1c67666b # v4.0.0
        with:
          report-file: admin/ui/e2e/results.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-go, lint-ui, test-go, test-ui]
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: admin/go.mod
          cache-dependency-path: admin/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Build admin portal
        run: make build-admin

      - name: Verify binary exists
        run: |
          test -f bin/chaperone-admin
          ./bin/chaperone-admin --version
