name: CI

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: 'v2.8.0'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - name: Check for code changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          fetch_failed() {
            echo "::warning::Change detection failed (GitHub API error). Running all checks as a precaution."
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              gh pr comment "${{ github.event.pull_request.number }}" \
                --repo "${{ github.repository }}" \
                --body "> [!WARNING]
          > **${{ github.workflow }}**: Change detection failed (GitHub API error). Running all checks as a precaution." || true
            fi
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          }
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename') || fetch_failed
          else
            FILES=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --paginate --jq '.files[].filename') || fetch_failed
          fi
          if [ -z "$FILES" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CODE_FILES=$(echo "$FILES" | grep -vE '\.md$|^LICENSE$' || true)
          if [ -n "$CODE_FILES" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  license:
    name: License Headers
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install addlicense
        run: go install github.com/google/addlicense@latest

      - name: Check license headers
        run: make license-check

  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Run golangci-lint (root module)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run golangci-lint (SDK module)
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: sdk

  test:
    name: Test
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Run tests (root module)
        run: go test -race ./...

      - name: Run tests (SDK module)
        run: cd sdk && go test -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [ license, lint, test ]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Build binary
        run: make build

      - name: Verify binary exists
        run: |
          test -f bin/chaperone
          ./bin/chaperone --version || true
