name: CI

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  GO_VERSION: '1.25.5'
  GOLANGCI_LINT_VERSION: 'v2.8.0'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint (root module)
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

      - name: Run golangci-lint (SDK module)
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: sdk

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies (root module)
        run: go mod download

      - name: Download dependencies (SDK module)
        run: cd sdk && go mod download

      - name: Run go vet (root module)
        run: go vet ./...

      - name: Run go vet (SDK module)
        run: cd sdk && go vet ./...

      - name: Run tests (root module)
        run: go test -race ./...

      - name: Run tests (SDK module)
        run: cd sdk && go test -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: make build

      - name: Verify binary exists
        run: |
          test -f bin/chaperone
          ./bin/chaperone --version || true
