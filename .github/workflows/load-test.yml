name: Load Test

on:
  pull_request:
    branches:
      - master
      - 'release/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  K6_VERSION: '0.56.0'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - name: Checkout action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions
          sparse-checkout-cone-mode: false

      - name: Detect code changes
        id: check
        uses: ./.github/actions/detect-code-changes

  smoke:
    name: Smoke Load Test
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum
            plugins/contrib/go.sum

      - name: Install k6
        uses: grafana/setup-k6-action@ffe7d7290dfa715e48c2ccc924d068444c94bde2 # v1.1.0
        with:
          k6-version: ${{ env.K6_VERSION }}

      - name: Generate certificates
        run: make gencerts

      - name: Copy certificates for load tests
        run: make gencerts-load

      - name: Start target server
        run: |
          go run test/load/targetserver/main.go &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9999/ >/dev/null 2>&1; then
              echo "Target server ready"
              break
            fi
            echo "Waiting for target server... ($i/30)"
            sleep 1
          done
          curl -sf http://localhost:9999/ >/dev/null 2>&1 || { echo "Target server failed to start"; exit 1; }

      - name: Build and start chaperone
        run: |
          make build-dev
          ./bin/chaperone -config configs/ci-load-test.yaml &
          for i in $(seq 1 30); do
            if curl -sf --cacert certs/ca.crt --cert certs/client.crt --key certs/client.key https://localhost:8443/_ops/health >/dev/null 2>&1; then
              echo "Chaperone ready"
              break
            fi
            echo "Waiting for chaperone... ($i/30)"
            sleep 1
          done
          curl -sf --cacert certs/ca.crt --cert certs/client.crt --key certs/client.key https://localhost:8443/_ops/health >/dev/null 2>&1 || { echo "Chaperone failed to start"; exit 1; }

      - name: Run smoke load test
        run: |
          mkdir -p test/load/results
          K6_INSECURE_SKIP_TLS_VERIFY=true k6 run --vus 10 --duration 1m -e K6_SCENARIO=smoke test/load/baseline.js
