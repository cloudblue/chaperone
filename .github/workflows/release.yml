name: Release

on:
  push:
    tags:
      - 'v*'           # Core releases: v1.0.0, v1.2.3
      - 'sdk/v*'       # SDK releases: sdk/v1.0.0

permissions:
  contents: write

env:
  GO_VERSION: '1.25.5'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Only run for core version tags (v*), not SDK tags
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests before release
        run: |
          go test -race ./...
          cd sdk && go test -race ./...

      - name: Build binaries for multiple platforms
        run: |
          mkdir -p dist
          
          # Linux AMD64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.GitCommit=${{ github.sha }}" \
            -o dist/chaperone-linux-amd64 \
            ./cmd/chaperone
          
          # Linux ARM64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "-s -w -X main.Version=${{ github.ref_name }} -X main.GitCommit=${{ github.sha }}" \
            -o dist/chaperone-linux-arm64 \
            ./cmd/chaperone

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/chaperone-*
            dist/checksums.txt

  # Notify on SDK releases (no binaries to build)
  sdk-release:
    name: SDK Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run SDK tests
        run: cd sdk && go test -race ./...

      - name: Create GitHub Release for SDK
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## SDK Release ${{ github.ref_name }}
            
            This is a release of the Chaperone SDK module.
            
            ### Installation
            ```bash
            go get github.com/cloudblue/chaperone/sdk@${{ github.ref_name }}
            ```
