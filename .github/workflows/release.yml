name: Release

on:
  push:
    tags:
      - 'v*' # Core releases: v1.0.0, v1.2.3
      - 'sdk/v*' # SDK releases: sdk/v1.0.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  GOVULNCHECK_VERSION: 'v1.1.4'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run for core version tags (v*), not SDK tags
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Run vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...
          cd sdk && govulncheck ./...

      - name: Run tests before release
        run: |
          go test -race ./...
          cd sdk && go test -race ./...

      - name: Build binaries for multiple platforms
        run: |
          mkdir -p dist

          # Build flags matching Makefile production build
          VERSION="${{ github.ref_name }}"
          GIT_COMMIT="${{ github.sha }}"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          LDFLAGS="-s -w \
            -X main.Version=${VERSION} \
            -X main.GitCommit=${GIT_COMMIT} \
            -X main.BuildDate=${BUILD_DATE} \
            -X github.com/cloudblue/chaperone/internal/proxy.allowInsecureTargets=false"

          # Linux AMD64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "${LDFLAGS}" \
            -o dist/chaperone-linux-amd64 \
            ./cmd/chaperone

          # Linux ARM64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "${LDFLAGS}" \
            -o dist/chaperone-linux-arm64 \
            ./cmd/chaperone

          # Darwin (macOS) AMD64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags "${LDFLAGS}" \
            -o dist/chaperone-darwin-amd64 \
            ./cmd/chaperone

          # Darwin (macOS) ARM64 (Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "${LDFLAGS}" \
            -o dist/chaperone-darwin-arm64 \
            ./cmd/chaperone

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/chaperone-*
            dist/checksums.txt

  # Notify on SDK releases (no binaries to build)
  sdk-release:
    name: SDK Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Run vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          cd sdk && govulncheck ./...

      - name: Run SDK tests
        run: cd sdk && go test -race ./...

      - name: Extract SDK version
        id: version
        run: echo "sdk_version=${GITHUB_REF_NAME#sdk/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release for SDK
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## SDK Release ${{ github.ref_name }}

            This is a release of the Chaperone SDK module.

            ### Installation
            ```bash
            go get github.com/cloudblue/chaperone/sdk@${{ steps.version.outputs.sdk_version }}
            ```
