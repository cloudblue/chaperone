name: Release

on:
  push:
    tags:
      - 'v*' # Core releases: v1.0.0, v1.2.3
      - 'sdk/v*' # SDK releases: sdk/v1.0.0
      - 'plugins/contrib/v*' # Contrib releases: plugins/contrib/v0.1.0

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  GOVULNCHECK_VERSION: 'v1.1.4'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run for core version tags (v*), not SDK tags
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Run vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          govulncheck ./...
          cd sdk && govulncheck ./...

      - name: Run tests before release
        run: |
          go test -race ./...
          cd sdk && go test -race ./...

      - name: Build binaries for multiple platforms
        run: |
          mkdir -p dist

          # Build flags matching Makefile production build
          VERSION="${{ github.ref_name }}"
          GIT_COMMIT="${{ github.sha }}"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          LDFLAGS="-s -w \
            -X main.Version=${VERSION} \
            -X main.GitCommit=${GIT_COMMIT} \
            -X main.BuildDate=${BUILD_DATE} \
            -X github.com/cloudblue/chaperone/internal/proxy.allowInsecureTargets=false"

          # Linux AMD64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "${LDFLAGS}" \
            -o dist/chaperone-linux-amd64 \
            ./cmd/chaperone

          # Linux ARM64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "${LDFLAGS}" \
            -o dist/chaperone-linux-arm64 \
            ./cmd/chaperone

          # Darwin (macOS) AMD64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags "${LDFLAGS}" \
            -o dist/chaperone-darwin-amd64 \
            ./cmd/chaperone

          # Darwin (macOS) ARM64 (Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "${LDFLAGS}" \
            -o dist/chaperone-darwin-arm64 \
            ./cmd/chaperone

          # Onboard tool LDFLAGS (no proxy-specific flags)
          ONBOARD_LDFLAGS="-s -w \
            -X main.Version=${VERSION} \
            -X main.GitCommit=${GIT_COMMIT} \
            -X main.BuildDate=${BUILD_DATE}"

          # chaperone-onboard: Linux AMD64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -ldflags "${ONBOARD_LDFLAGS}" \
            -o dist/chaperone-onboard-linux-amd64 \
            ./cmd/chaperone-onboard

          # chaperone-onboard: Linux ARM64
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags "${ONBOARD_LDFLAGS}" \
            -o dist/chaperone-onboard-linux-arm64 \
            ./cmd/chaperone-onboard

          # chaperone-onboard: Darwin (macOS) AMD64
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -ldflags "${ONBOARD_LDFLAGS}" \
            -o dist/chaperone-onboard-darwin-amd64 \
            ./cmd/chaperone-onboard

          # chaperone-onboard: Darwin (macOS) ARM64 (Apple Silicon)
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "${ONBOARD_LDFLAGS}" \
            -o dist/chaperone-onboard-darwin-arm64 \
            ./cmd/chaperone-onboard

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/chaperone-*
            dist/checksums.txt

  # Notify on SDK releases (no binaries to build)
  sdk-release:
    name: SDK Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Run vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          cd sdk && govulncheck ./...

      - name: Run SDK tests
        run: cd sdk && go test -race ./...

      - name: Extract SDK version
        id: version
        run: echo "sdk_version=${GITHUB_REF_NAME#sdk/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release for SDK
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## SDK Release ${{ github.ref_name }}

            This is a release of the Chaperone SDK module.

            ### Installation
            ```bash
            go get github.com/cloudblue/chaperone/sdk@${{ steps.version.outputs.sdk_version }}
            ```

  # Notify on Contrib releases (no binaries to build)
  contrib-release:
    name: Contrib Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/plugins/contrib/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum
            plugins/contrib/go.sum

      - name: Run vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
          cd plugins/contrib && govulncheck ./...

      - name: Run Contrib tests
        run: cd plugins/contrib && go test -race ./...

      - name: Extract Contrib version
        id: version
        run: echo "contrib_version=${GITHUB_REF_NAME#plugins/contrib/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release for Contrib
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Contrib Release ${{ github.ref_name }}

            This is a release of the Chaperone Contrib Plugins module.

            ### Installation
            ```bash
            go get github.com/cloudblue/chaperone/plugins/contrib@${{ steps.version.outputs.contrib_version }}
            ```
