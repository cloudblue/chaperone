name: Security

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
    branches:
      - master
      - 'release/**'
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'schedule' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

env:
  GOVULNCHECK_VERSION: 'v1.1.4'
  GOSEC_VERSION: 'v2.23.0'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - name: Check for code changes
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          fetch_failed() {
            echo "::warning::Change detection failed (GitHub API error). Running all checks as a precaution."
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              gh pr comment "${{ github.event.pull_request.number }}" \
                --repo "${{ github.repository }}" \
                --body "> [!WARNING]
          > **${{ github.workflow }}**: Change detection failed (GitHub API error). Running all checks as a precaution." || true
            fi
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          }
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename') || fetch_failed
          else
            FILES=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }} --paginate --jq '.files[].filename') || fetch_failed
          fi
          if [ -z "$FILES" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CODE_FILES=$(echo "$FILES" | grep -vE '\.md$|^LICENSE$' || true)
          if [ -n "$CODE_FILES" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  govulncheck:
    name: Vulnerability Check
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: Run govulncheck (root module)
        run: govulncheck ./...

      - name: Run govulncheck (SDK module)
        run: cd sdk && govulncheck ./...

  gosec:
    name: Security Scan (gosec)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            sdk/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}

      - name: Run gosec (root module)
        # G706 (Log injection): All logging uses slog structured logging where
        #   values are written as separate JSON key-value pairs, never interpolated
        #   into message strings. Log injection is not possible.
        #   Safety net: the "no-raw-logging" step below enforces that all
        #   production code uses slog, not fmt.Print*/log.Print*.
        run: gosec -exclude=G706 -exclude-dir=sdk ./...

      - name: Run gosec (SDK module)
        run: cd sdk && gosec ./...

