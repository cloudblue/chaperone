# Minimal configuration for Docker container testing
# TLS disabled by default - mount certificates for production use

server:
  addr: ":8443"
  # Note: Use "127.0.0.1:9090" for localhost-only (default).
  # Use ":9090" only if you need container-external access to admin endpoints.
  admin_addr: ":9090"
  tls:
    # TLS disabled for testing - override via env or mount certs for production
    enabled: false

upstream:
  header_prefix: "X-Connect"
  # REQUIRED: Configure your vendor hosts here.
  # An empty allow_list rejects all proxy requests (secure default).
  # Override via volume mount or environment variables in production.
  allow_list: {}

observability:
  log_level: "info"
